name: Run After PR Approval

on:
  pull_request_review:
    types: [submitted]

jobs:
  after-approval:
    if: github.event.review.state == 'approved'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run after PR approval
        run: echo "The pull request has been approved!"

      - name: List files
        run: ls -laRt

      - name: Read testing.txt
        run: cat testing.txt